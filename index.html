    <style>
        :root {
            --color-orchid: #BA55D3;
            --color-orchid-dark: #9c4ab0;
            --color-gold: #FFD700;
            --color-primary-dark: #1a1a1a;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* ============ Layout Base ============ */
        body {
            @apply antialiased;
        }

        .bg-forest-fixed {
            background-image: url('https://images.unsplash.com/photo-1448375240586-882707db888b?q=80&w=2000');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
        }

        .dark-overlay {
            background-color: rgba(6, 12, 6, 0.75);
        }

        /* ============ Glass Effect ============ */
        .glass-panel {
            background: rgba(25, 35, 25, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: var(--transition-smooth);
        }

        .glass-panel:hover {
            background: rgba(25, 35, 25, 0.55);
            border-color: rgba(255, 255, 255, 0.12);
        }

        /* ============ Form Inputs ============ */
        .glass-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: var(--transition-smooth);
        }

        .glass-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .glass-input:focus {
            border-color: var(--color-orchid);
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            box-shadow: 0 0 12px rgba(186, 85, 211, 0.2);
        }

        .glass-input.error {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
        }

        /* ============ Buttons ============ */
        .btn-orchid {
            background-color: var(--color-orchid);
            color: white;
            font-weight: bold;
            transition: var(--transition-smooth);
            border: none;
            cursor: pointer;
        }

        .btn-orchid:hover {
            background-color: var(--color-orchid-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(186, 85, 211, 0.3);
        }

        .btn-orchid:active {
            transform: translateY(0);
        }

        .btn-orchid:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ============ Typography ============ */
        .text-orchid {
            color: var(--color-orchid);
        }

        .text-gold {
            color: var(--color-gold);
        }

        .vip-gradient {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ============ Animations ============ */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(186, 85, 211, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(186, 85, 211, 0); }
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        .slide-in {
            animation: slideIn 0.5s ease-out forwards;
        }

        .pulse-glow {
            animation: pulse-glow 2s infinite;
        }

        /* ============ Contact Section ============ */
        .contact-section {
            background-color: #273c75;
            padding: 40px 20px;
            color: white;
            text-align: center;
        }

        .contact-section h2 {
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .contact-section a {
            display: inline-block;
            background-color: #e84118;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            margin: 10px;
            transition: background 0.3s ease;
            text-decoration: none;
        }

        .contact-section a:hover {
            background-color: #c23616;
            text-decoration: none;
        }

        /* ============ Utilities ============ */
        .loading-spinner {
            border: 2px solid rgba(186, 85, 211, 0.2);
            border-radius: 50%;
            border-top: 2px solid var(--color-orchid);
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ============ Responsive ============ */
        @media (max-width: 768px) {
            .glass-panel {
                backdrop-filter: blur(10px);
            }

            .vip-gradient {
                font-size: 0.875rem;
            }
        }
    </style>
</head>

                                        <p class="text-[10px] uppercase text-gray-400 font-bold tracking-wider mb-1.5">POIs:</p>
                                        <ul class="text-xs space-y-1 text-gray-300">
                                            ${route.pois.map(p => `<li>• ${p}</li>`).join('')}
                                        </ul>
                                    </div>
                                ` : `
                                    <div class="bg-purple-950/20 border border-purple-500/20 p-3 rounded-lg mb-4 text-center">
                                        <p class="text-[10px] uppercase text-purple-300 font-bold">Secretos del Bosque</p>
                                        <p class="text-xs text-purple-200 mt-1 italic">POIs guardados para la aventura</p>
                                    </div>
                                `}
                                
                                <p class="text-gray-300 text-xs line-clamp-3 leading-relaxed">${route.description}</p>
                            </div>
                        </div>

                        <div class="p-5 pt-0">
                            <button onclick="app.selectRoute('${route.id}')" class="w-full btn-orchid py-2.5 rounded-xl text-xs tracking-wide">
                                Seleccionar
                            </button>
                        </div>
                    </div>
                `;
            },

            aiScoutWidget() {
                return `
                    <div id="ai-scout-anchor" class="hidden max-w-3xl mx-auto p-8 bg-white text-gray-900 rounded-3xl shadow-2xl border-t-8 border-purple-500 slide-in relative overflow-hidden">
                        <div class="absolute -top-10 -right-10 text-gray-100 font-black text-9xl pointer-events-none select-none opacity-20">AI</div>
                        <h2 class="text-3xl font-extrabold tracking-tight flex items-center gap-2 mb-2">
                            <span class="text-orchid">✦</span> Mazaventura AI Scout
                        </h2>
                        <p class="text-gray-500 mb-6 text-sm" id="ai-prompt">Selecciona una ruta para análisis personalizado.</p>
                        
                        <div class="space-y-6 relative z-10">
                            <div>
                                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Ritmo de Expedición:</label>
                                <select id="ai-pace-select" class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-xl focus:border-purple-500 focus:ring-0 outline-none font-semibold">
                                    <option value="calm">Ritmo Calmo (Paisajes & Fotografía)</option>
                                    <option value="dynamic">Ritmo Dinámico (Terrenos combinados)</option>
                                    <option value="technical">Expedición Técnica (Pilotos experimentados)</option>
                                </select>
                            </div>
                            
                            <button onclick="app.generateCheckout()" class="w-full btn-orchid text-white font-extrabold text-base py-4 rounded-xl shadow-lg">
                                GENERAR ITINERARIO Y CHECKOUT
                            </button>
                        </div>
                    </div>
                `;
            },

            checkoutSection() {
                return `
                    <div id="checkout-anchor" class="hidden max-w-xl mx-auto p-8 glass-panel rounded-3xl border border-purple-500/30 shadow-[0_0_50px_rgba(186,85,211,0.15)] slide-in">
                        <h2 class="text-2xl font-bold mb-6 text-white flex items-center gap-2">
                            <svg class="w-6 h-6 text-orchid" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2 9m10-9l2 9m-9 0h14"></path>
                            </svg>
                            Checkout de Expedición
                        </h2>

                        <div class="bg-black/40 p-6 rounded-2xl space-y-4 mb-6 text-sm">
                            <div class="flex justify-between border-b border-white/5 pb-2">
                                <span class="text-gray-400">Ruta:</span>
                                <span class="font-bold text-white" id="chk-title">---</span>
                            </div>
                            <div class="flex justify-between border-b border-white/5 pb-2">
                                <span class="text-gray-400">Duración:</span>
                                <span class="font-bold text-white" id="chk-duration">---</span>
                            </div>
                            <div class="flex justify-between border-b border-white/5 pb-2">
                                <span class="text-gray-400">Ritmo:</span>
                                <span class="font-bold text-purple-300" id="chk-pace">---</span>
                            </div>
                            <div class="flex justify-between pt-2 text-xl font-extrabold">
                                <span>Total:</span>
                                <span class="text-yellow-400" id="chk-price">$0 MXN</span>
                            </div>
                        </div>

                        <button onclick="app.processPayment()" class="w-full bg-green-500 hover:bg-green-400 text-black font-extrabold py-4 rounded-xl shadow-lg transition">
                            CONFIRMAR Y PAGAR
                        </button>

                        <div id="boarding-pass" class="hidden mt-8 bg-white text-gray-900 p-6 rounded-2xl shadow-xl border-t-8 border-green-500 slide-in text-center">
                            <h3 class="font-extrabold text-lg tracking-wider mb-1 uppercase">Pase de Abordar</h3>
                            <p class="text-xs text-gray-400 mb-4">Garantía Mazaventura 2.0</p>
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=MazaventuraReservation" alt="QR Code" class="mx-auto rounded-lg mb-4 border border-gray-300">
                            <p class="text-xs font-bold text-gray-500">Preséntate 15 minutos antes en nuestro establecimiento.</p>
                        </div>
                    </div>
                `;
            },

            selectRoute(routeId) {
                if (!Validators.routeId(routeId)) return;
                
                this.state.selectedRoute = ROUTES_DATA.find(r => r.id === routeId);
                this.state.currentView = 'routes';
                this.render();
                
                setTimeout(() => {
                    const scout = document.getElementById('ai-scout-anchor');
                    if (scout) {
                        scout.classList.remove('hidden');
                        document.getElementById('ai-prompt').innerHTML = `
                            He detectado tu interés en <strong class="text-orchid">${this.state.selectedRoute.title}</strong> 
                            (${this.state.selectedRoute.duration}). Ajustaré el itinerario según tu nivel.
                        `;
                        scout.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }, 100);
            },

            generateCheckout() {
                if (!this.state.selectedRoute) return;

                const paceSelect = document.getElementById('ai-pace-select');
                const paceText = paceSelect.options[paceSelect.selectedIndex].text;

                document.getElementById('chk-title').textContent = this.state.selectedRoute.title;
                document.getElementById('chk-duration').textContent = this.state.selectedRoute.duration;
                document.getElementById('chk-pace').textContent = paceText;
                document.getElementById('chk-price').textContent = `$${this.state.selectedRoute.price.toLocaleString()} MXN`;

                const checkout = document.getElementById('checkout-anchor');
                checkout.classList.remove('hidden');
                document.getElementById('boarding-pass').classList.add('hidden');

                setTimeout(() => {
                    checkout.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 150);
            },

            processPayment() {
                if (!this.state.selectedRoute) return;

                const bp = document.getElementById('boarding-pass');
                bp.classList.remove('hidden');

                this.state.notifications.unshift({
                    id: Date.now(),
                    type: "Venta",
                    details: `Venta Confirmada: ${this.state.selectedRoute.title}`,
                    date: new Date().toLocaleString('es-MX'),
                    status: "Completado"
                });

                this.showModal(
                    "Expedición Asegurada",
                    "Tu pago ha sido procesado de manera segura. Presenta el Pase de Abordar QR al llegar."
                );

                setTimeout(() => {
                    bp.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 150);
            },

            // ==================== ADMIN VIEW ====================
            renderAdmin(container) {
                container.innerHTML = `
                    <div class="fade-in space-y-10">
                        <div>
                            <h1 class="text-3xl font-extrabold text-white">Centro de Comando</h1>
                            <p class="text-gray-400 text-sm mt-1">Gestiona reputación, conversiones y auditoría.</p>
                        </div>

                        <div class="flex gap-4 border-b border-white/10 mb-6 overflow-x-auto">
                            <button onclick="app.switchAdminTab('dashboard')" class="pb-3 text-sm font-bold border-b-2 transition whitespace-nowrap ${this.state.adminTab === 'dashboard' ? 'border-purple-500 text-white' : 'border-transparent text-gray-400'}">
                                Dashboard
                            </button>
                            <button onclick="app.switchAdminTab('reviews')" class="pb-3 text-sm font-bold border-b-2 transition whitespace-nowrap ${this.state.adminTab === 'reviews' ? 'border-purple-500 text-white' : 'border-transparent text-gray-400'}">
                                Reseñas
                            </button>
                            <button onclick="app.switchAdminTab('forms')" class="pb-3 text-sm font-bold border-b-2 transition whitespace-nowrap ${this.state.adminTab === 'forms' ? 'border-purple-500 text-white' : 'border-transparent text-gray-400'}">
                                Formularios
                            </button>
                        </div>

                        <div id="admin-content">
                            <!-- Content injected here -->
                        </div>
                    </div>
                `;

                this.renderAdminTab();
            },

            switchAdminTab(tabId) {
                this.state.adminTab = tabId;
                this.renderAdminTab();
            },

            renderAdminTab() {
                const content = document.getElementById('admin-content');
                if (!content) return;

                const tabMap = {
                    dashboard: () => this.adminDashboard(),
                    reviews: () => this.adminReviews(),
                    forms: () => this.adminForms()
                };

                const renderer = tabMap[this.state.adminTab];
                if (renderer) content.innerHTML = renderer();
            },

            adminDashboard() {
                return `
                    <div class="grid md:grid-cols-2 gap-8 slide-in">
                        <div class="glass-panel p-6 rounded-2xl">
                            <h3 class="text-lg font-bold mb-4">Métricas por Rutas (Mensual)</h3>
                            <div class="space-y-6">
                                ${ROUTES_DATA.map(r => `
                                    <div>
                                        <div class="flex justify-between text-xs mb-1">
                                            <span class="font-bold">${r.title} ${r.isVip ? '<span class="text-gold text-[10px] ml-1">[VIP]</span>' : ''}</span>
                                            <span class="text-gray-400 font-semibold">${Math.round(r.popularity * 0.4)} Reservas</span>
                                        </div>
                                        <div class="w-full bg-white/5 h-2.5 rounded-full overflow-hidden">
                                            <div class="h-full rounded-full ${r.isVip ? 'bg-yellow-500' : 'bg-purple-500'}" style="width: ${r.popularity}%"></div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="glass-panel p-6 rounded-2xl">
                            <h3 class="text-lg font-bold mb-4">Estrategias Activas</h3>
                            <div class="space-y-4">
                                <div class="bg-purple-950/20 border border-purple-500/20 p-4 rounded-xl flex gap-3">
                                    <div class="text-2xl">📈</div>
                                    <div>
                                        <h4 class="font-bold text-sm text-purple-200">Prueba Social</h4>
                                        <p class="text-xs text-gray-400 mt-0.5">Inyección dinámica de preferencia para conversiones.</p>
                                    </div>
                                </div>
                                <div class="bg-yellow-950/20 border border-yellow-500/20 p-4 rounded-xl flex gap-3">
                                    <div class="text-2xl">⚡</div>
                                    <div>
                                        <h4 class="font-bold text-sm text-yellow-200">Trigger de Escasez</h4>
                                        <p class="text-xs text-gray-400 mt-0.5">Alertas automáticas para disponibilidad baja.</p>
                                    </div>
                                </div>
                                <button onclick="app.triggerScarcity()" class="w-full btn-orchid py-2.5 rounded-xl text-xs mt-4">
                                    PROBAR NOTIFICACIÓN
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            },

            adminReviews() {
                return `
                    <div class="glass-panel p-6 rounded-2xl slide-in space-y-6">
                        <div>
                            <h3 class="text-lg font-bold">Gestión de Reseñas</h3>
                            <p class="text-xs text-gray-400">Automatiza respuestas a críticas negativas.</p>
                        </div>

                        <div class="space-y-4">
                            ${this.state.reviews.map(review => `
                                <div class="bg-black/30 p-5 rounded-xl border-l-4 ${review.rating <= 3 ? 'border-red-500' : 'border-green-500'} flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                                    <div>
                                        <div class="flex items-center gap-2">
                                            <span class="font-bold text-sm text-white">${review.author}</span>
                                            <span class="text-xs text-gray-400">(${review.route})</span>
                                            <span class="text-xs ${review.rating <= 3 ? 'bg-red-500/10 text-red-400' : 'bg-green-500/10 text-green-400'} px-2 py-0.5 rounded-full font-bold">
                                                ${review.rating} ★
                                            </span>
                                        </div>
                                        <p class="text-xs italic text-gray-300 mt-1">"${review.text}"</p>
                                    </div>
                                    <div class="flex gap-2 w-full sm:w-auto">
                                        <button onclick="app.replyReview(${review.id}, 'refund')" class="flex-1 sm:flex-initial bg-red-500/10 text-red-400 hover:bg-red-500/20 text-[11px] font-bold px-3 py-1.5 rounded transition">
                                            Reembolso
                                        </button>
                                        <button onclick="app.replyReview(${review.id}, 'apology')" class="flex-1 sm:flex-initial bg-gray-700 hover:bg-gray-600 text-[11px] font-bold px-3 py-1.5 rounded transition">
                                            Responder
                                        </button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            },

            adminForms() {
                return `
                    <div class="grid md:grid-cols-2 gap-8 slide-in">
                        <div class="glass-panel p-6 rounded-2xl">
                            <h3 class="text-lg font-bold mb-1">Registrar Operador</h3>
                            <p class="text-xs text-gray-400 mb-6">Validación estricta de datos.</p>
                            
                            <form onsubmit="app.registerOperator(event)" class="space-y-4">
                                <div>
                                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Email:</label>
                                    <input type="email" id="reg-email" placeholder="ejemplo@mazaventura.com" class="w-full p-3 rounded-lg glass-input text-sm">
                                    <span id="err-email" class="text-[11px] text-red-400 mt-1 hidden"></span>
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Teléfono:</label>
                                    <input type="tel" id="reg-phone" placeholder="10 dígitos" class="w-full p-3 rounded-lg glass-input text-sm">
                                    <span id="err-phone" class="text-[11px] text-red-400 mt-1 hidden"></span>
                                </div>
                                <button type="submit" class="w-full btn-orchid py-3 text-sm rounded-xl">REGISTRAR</button>
                            </form>
                        </div>

                        <div class="glass-panel p-6 rounded-2xl flex flex-col justify-between">
                            <div>
                                <div class="flex justify-between items-center mb-4 gap-2">
                                    <h3 class="text-lg font-bold">Auditoría</h3>
                                    <input type="text" oninput="app.searchNotifications(this.value)" placeholder="Buscar..." class="p-1.5 rounded-lg glass-input text-xs w-32">
                                </div>
                                
                                <div class="overflow-y-auto max-h-96 space-y-2 pr-2" id="audit-log">
                                    <!-- Notifications rendered here -->
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            registerOperator(e) {
                e.preventDefault();

                const email = document.getElementById('reg-email').value;
                const phone = document.getElementById('reg-phone').value;
                const errEmail = document.getElementById('err-email');
                const errPhone = document.getElementById('err-phone');

                // Reset errors
                errEmail.classList.add('hidden');
                errPhone.classList.add('hidden');
                document.getElementById('reg-email').classList.remove('error');
                document.getElementById('reg-phone').classList.remove('error');

                let isValid = true;

                if (!Validators.email(email)) {
                    errEmail.textContent = 'Email inválido';
                    errEmail.classList.remove('hidden');
                    document.getElementById('reg-email').classList.add('error');
                    isValid = false;
                }

                if (!Validators.phone(phone)) {
                    errPhone.textContent = 'Teléfono: 10 dígitos requeridos';
                    errPhone.classList.remove('hidden');
                    document.getElementById('reg-phone').classList.add('error');
                    isValid = false;
                }

                if (isValid) {
                    this.state.notifications.unshift({
                        id: Date.now(),
                        type: "Auditoría",
                        details: `Nuevo Operador: ${email}`,
                        date: new Date().toLocaleString('es-MX'),
                        status: "Éxito"
                    });

                    this.showModal("Éxito", `Operador ${email} registrado correctamente.`);
                    e.target.reset();
                    this.renderAuditLog();
                }
            },

            searchNotifications(query) {
                this.state.searchQuery = query.toLowerCase();
                this.renderAuditLog();
            },

            renderAuditLog() {
                const log = document.getElementById('audit-log');
                if (!log) return;

                const filtered = this.state.notifications.filter(n =>
                    n.type.toLowerCase().includes(this.state.searchQuery) ||
                    n.details.toLowerCase().includes(this.state.searchQuery)
                );

                log.innerHTML = filtered.length === 0
                    ? '<p class="text-xs text-gray-500 text-center py-4">Sin registros</p>'
                    : filtered.map(n => `
                        <div class="p-3 bg-black/20 rounded-lg text-xs flex justify-between items-start border-l-2 ${n.type === 'Venta' ? 'border-green-500' : 'border-purple-400'}">
                            <div>
                                <div class="flex items-center gap-1.5 font-bold text-white mb-0.5">
                                    <span>[${n.type}]</span>
                                    <span class="text-[10px] text-gray-400">${n.date}</span>
                                </div>
                                <p class="text-gray-300">${n.details}</p>
                            </div>
                            <span class="text-[9px] bg-white/5 px-2 py-0.5 rounded text-gray-400 font-bold uppercase">${n.status}</span>
                        </div>
                    `).join('');
            },

            replyReview(reviewId, type) {
                const review = this.state.reviews.find(r => r.id === reviewId);
                if (!review) return;

                const replies = {
                    refund: `Respuesta a ${review.author}: Lamentamos tu insatisfacción. Procesaremos un reembolso inmediato.`,
                    apology: `Respuesta a ${review.author}: Agradecemos tu retroalimentación. Mejoraremos nuestros servicios.`
                };

                review.status = "Atendido";
                this.state.notifications.unshift({
                    id: Date.now(),
                    type: "Mitigación",
                    details: `Se respondió a ${review.author}`,
                    date: new Date().toLocaleString('es-MX'),
                    status: "Completado"
                });

                this.showModal("Respuesta Enviada", replies[type]);
                this.renderAdminTab();
            },

            // ==================== UTILITIES ====================
            triggerScarcity() {
                const notifCenter = document.getElementById('notification-center');
                const alertId = Date.now();

                const html = `
                    <div id="alert-${alertId}" class="glass-panel p-4 rounded-xl border border-purple-500 shadow-2xl slide-in cursor-pointer hover:bg-white/5 transition pointer-events-auto">
                        <div class="flex justify-between items-start">
                            <div>
                                <h4 class="font-bold text-sm text-purple-300">⚠️ Disponibilidad Crítica</h4>
                                <p class="text-xs text-gray-300 mt-1">Última plaza en <strong class="text-white">Barranca Verde</strong> hoy.</p>
                            </div>
                            <span class="bg-purple-600 text-white text-[10px] font-bold px-2 py-0.5 rounded">ASEGURAR</span>
                        </div>
                    </div>
                `;

                notifCenter.innerHTML = html;

                setTimeout(() => {
                    const el = document.getElementById(`alert-${alertId}`);
                    if (el) el.remove();
                }, 10000);
            },

            showModal(title, desc) {
                document.getElementById('modal-title').textContent = title;
                document.getElementById('modal-desc').textContent = desc;
                document.getElementById('custom-modal').classList.remove('hidden');
            },

            closeModal() {
                document.getElementById('custom-modal').classList.add('hidden');
            }
        };

        // ==================== INITIALIZE APP ====================
        window.addEventListener('DOMContentLoaded', () => {
            app.navigate('home');
            
            setTimeout(() => {
                app.triggerScarcity();
            }, 4000);
        });
    </script>
</body>
</html>
